<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CinemaSync - אופטימיזציית כוח אדם</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
    <link rel="stylesheet" href="CSS/Styles.css" />
  </head>

  <body class="bg-dark text-light">
    <nav class="navbar navbar-dark bg-dark-surface border-bottom border-secondary sticky-top mb-4" dir="ltr">
      <div class="container-fluid d-flex justify-content-between align-items-center">

        <a href="index.html" class="btn btn-link text-light p-0" aria-label="חזרה לדשבורד">
          <i class="fa-solid fa-arrow-left fa-lg"></i>
        </a>

        <div class="text-center">
          <h5 class="m-0 fw-bold">אופטימיזציית כוח אדם</h5>
          <small class="text-teal fw-bold shadow-sm" id="navBranchDisplay"></small>
        </div>

        <a href="#" class="btn btn-link text-danger p-0 btn-logout" title="Log Out" aria-label="Log Out">
          <i class="fa-solid fa-power-off fa-lg"></i>
        </a>
      </div>
    </nav>

    <main>
      <section id="manpowerScreen" class="screen container mt-3">

        <div class="card bg-surface border-0 p-4 mb-4" id="manpowerFormCard">
          <h5 class="fw-bold mb-4 text-green">
            <i class="fa-solid fa-users-gear me-2"></i>חישוב כמות עובדים נדרשת
          </h5>

          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label small text-muted">1. סוג היום</label>
              <select id="optDayType" class="form-select">
                <option value="weekday">יום חול רגיל</option>
                <option value="weekend">סוף שבוע (שישי-שבת)</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label small text-muted">2. משמרת</label>
              <select id="optShift" class="form-select">
                <option value="morning">משמרת בוקר</option>
                <option value="afternoon">משמרת צהריים</option>
                <option value="night">משמרת ערב/לילה</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label small text-muted">3. מזג אוויר</label>
              <select id="optWeather" class="form-select">
                <option value="clear">☀️ בהיר / שמשי</option>
                <option value="cloudy">☁️ מעונן</option>
                <option value="rainy">🌧️ גשום / סוער</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label small text-muted">4. אירועים בסביבה</label>
              <select id="optEvents" class="form-select">
                <option value="none">אין אירועים מיוחדים</option>
                <option value="minor">אירוע מקומי קטן</option>
                <option value="major">קונצרט/משחק גדול</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label small text-muted">5. סטטוס חג</label>
              <div class="toggle-container">
                <span class="text-white small"><i class="fa-solid fa-umbrella-beach text-teal me-2"></i>האם זה יום חג?</span>
                <div class="form-check form-switch m-0">
                  <input class="form-check-input" type="checkbox" id="optHoliday">
                </div>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label small text-muted">6. סטטוס בכורה</label>
              <div class="toggle-container">
                <span class="text-white small"><i class="fa-solid fa-star text-warning me-2"></i>בכורת סרט גדולה?</span>
                <div class="form-check form-switch m-0">
                  <input class="form-check-input" type="checkbox" id="optPremiere">
                </div>
              </div>
            </div>

            <div class="col-12 spacing-fix">
              <label class="form-label small text-muted d-flex justify-content-between">
                <span>7. כרטיסים שנמכרו מראש (תפוסה)</span>
                <span id="sliderValue" class="text-green fw-bold">0%</span>
              </label>
              <input type="range" class="form-range" id="optPreSales" min="0" max="100" step="10" value="0">
            </div>

          </div>

          <button class="btn w-100 fw-bold mt-4 p-3" id="btnCalcManpower" style="background-color: #4ade80; color: #121212; border-radius: 8px;" aria-label="Run Model">
            <i class="fa-solid fa-microchip me-2"></i> הרץ מודל אופטימיזציה
          </button>
        </div>

        <div id="manpowerResults" class="d-none">
          <div class="result-card text-center">

            <h5 class="text-muted text-uppercase letter-spacing-2 mb-3">סה"כ עובדים נדרשים</h5>

            <div class="display-1 result-number mb-0" id="resultStaffCount">--</div>
            <div class="text-green small mb-4">סך כל העובדים למשמרת</div>

            <hr class="border-secondary opacity-25 my-4">

            <div class="row g-3">

              <div class="col-6 col-md-3">
                <div class="role-card">
                  <div class="role-icon"><i class="fa-solid fa-burger"></i></div>
                  <div class="role-title">דוכן חטיפים</div>
                  <div class="role-value" id="resSnacks">0</div>
                </div>
              </div>

              <div class="col-6 col-md-3">
                <div class="role-card">
                  <div class="role-icon"><i class="fa-solid fa-broom"></i></div>
                  <div class="role-title">ניקיון</div>
                  <div class="role-value" id="resCleaners">0</div>
                </div>
              </div>

              <div class="col-6 col-md-3">
                <div class="role-card">
                  <div class="role-icon"><i class="fa-solid fa-ticket"></i></div>
                  <div class="role-title">קופות</div>
                  <div class="role-value" id="resCashiers">0</div>
                </div>
              </div>

              <div class="col-6 col-md-3">
                <div class="role-card">
                  <div class="role-icon"><i class="fa-solid fa-video"></i></div>
                  <div class="role-title">הקרנה</div>
                  <div class="role-value" id="resScreening">0</div>
                </div>
              </div>

            </div>
          </div>

          <button class="btn btn-outline-light w-100 mt-3 py-2" id="btnResetManpower" aria-label="Adjust Criteria">
            <i class="fa-solid fa-rotate-left me-2"></i> שינוי קריטריונים
          </button>
        </div>

      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="JS/mockData.js"></script>
    <script src="JS/manpowerOptimization-demo.js"></script>
  </body>
</html>
